<h1>🎉 Congratulations!</h1>

<p>Your Score: {{ grade }}/{{ possible }}</p>

<hr>

<h2>Exam Results:</h2>

<ul>
{% for choice in choices %}
    <li>
        Question: {{ choice.question.question_text }}<br>
        Your Answer: {{ choice.choice_text }}
        {% if choice.is_correct %}
            ✔ Correct
        {% else %}
            ❌ Incorrect
        {% endif %}
    </li>
{% endfor %}
</ul>
